 "cells": [
  {
   "cell_type": "markdown",
   "metadata": {},
   "source": [
    "# Exploratory Data Analysis — NYC Airbnb Short-term Rental Prices\n",
    "\n",
    "This notebook performs exploratory data analysis on the NYC Airbnb dataset.\n",
    "We use it to understand the data before building our ML pipeline."
   ]
  },
  {
   "cell_type": "markdown",
   "metadata": {},
   "source": [
    "## Step 1: Initialize W&B and Load Data"
   ]
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "metadata": {},
   "outputs": [],
   "source": [
    "import wandb\n",
    "import pandas as pd\n",
    "import numpy as np\n",
    "import matplotlib.pyplot as plt\n",
    "import seaborn as sns\n",
    "\n",
    "run = wandb.init(project='nyc_airbnb', group='eda', save_code=True)\n",
    "\n",
    "# Fetch the raw data artifact\n",
    "local_path = wandb.use_artifact('sample.csv:latest').file()\n",
    "df = pd.read_csv(local_path)\n",
    "print(f'Dataset shape: {df.shape}')\n",
    "df.head()"
   ]
  },
  {
   "cell_type": "markdown",
   "metadata": {},
   "source": [
    "## Step 2: Generate Profile Report\n",
    "\n",
    "We use ydata-profiling to get an overview of the dataset,\n",
    "including missing values, distributions, and correlations."
   ]
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "metadata": {},
   "outputs": [],
   "source": [
    "import ydata_profiling\n",
    "\n",
    "profile = ydata_profiling.ProfileReport(df)\n",
    "profile.to_notebook_iframe()"
   ]
  },
  {
   "cell_type": "markdown",
   "metadata": {},
   "source": [
    "## Step 3: Key Observations from the Profile Report\n",
    "\n",
    "From the profile report, we identified the following issues:\n",
    "\n",
    "1. **Missing values** in several columns (e.g., `reviews_per_month`, `last_review`, `host_name`, `name`)\n",
    "2. **`last_review` is stored as a string** — it should be datetime\n",
    "3. **Outliers in `price`**: some listings have a price of \\$0, and some are extremely high (>\\$10,000)\n",
    "\n",
    "After discussion with stakeholders, we will restrict nightly prices to **\\$10 — \\$350**."
   ]
  },
  {
   "cell_type": "markdown",
   "metadata": {},
   "source": [
    "## Step 4: Price Distribution Analysis"
   ]
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "metadata": {},
   "outputs": [],
   "source": [
    "fig, axes = plt.subplots(1, 2, figsize=(14, 5))\n",
    "\n",
    "# Before filtering\n",
    "axes[0].hist(df['price'], bins=100, color='steelblue', edgecolor='white')\n",
    "axes[0].set_title('Price Distribution (Before Filtering)')\n",
    "axes[0].set_xlabel('Price (USD per night)')\n",
    "axes[0].set_ylabel('Count')\n",
    "\n",
    "# After filtering\n",
    "df_filtered = df[df['price'].between(10, 350)]\n",
    "axes[1].hist(df_filtered['price'], bins=100, color='green', edgecolor='white')\n",
    "axes[1].set_title('Price Distribution (After Filtering: $10-$350)')\n",
    "axes[1].set_xlabel('Price (USD per night)')\n",
    "axes[1].set_ylabel('Count')\n",
    "\n",
    "plt.tight_layout()\n",
    "plt.show()\n",
    "\n",
    "print(f'Rows before filtering: {len(df)}')\n",
    "print(f'Rows after filtering: {len(df_filtered)}')\n",
    "print(f'Rows removed: {len(df) - len(df_filtered)}')"
   ]
  },
  {
   "cell_type": "markdown",
   "metadata": {},
   "source": [
    "## Step 5: Apply Basic Fixes"
   ]
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "metadata": {},
   "outputs": [],
   "source": [
    "# Drop price outliers\n",
    "min_price = 10\n",
    "max_price = 350\n",
    "idx = df['price'].between(min_price, max_price)\n",
    "df = df[idx].copy()\n",
    "\n",
    "# Convert last_review to datetime\n",
    "df['last_review'] = pd.to_datetime(df['last_review'])\n",
    "\n",
    "print('Price range after filtering:')\n",
    "print(f'  Min: ${df[\"price\"].min()}')\n",
    "print(f'  Max: ${df[\"price\"].max()}')\n",
    "print(f'\\nlast_review dtype: {df[\"last_review\"].dtype}')"
   ]
  },
  {
   "cell_type": "markdown",
   "metadata": {},
   "source": [
    "## Step 6: Neighbourhood Group Analysis"
   ]
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "metadata": {},
   "outputs": [],
   "source": [
    "fig, axes = plt.subplots(1, 2, figsize=(14, 5))\n",
    "\n",
    "# Count by neighbourhood group\n",
    "neigh_counts = df['neighbourhood_group'].value_counts()\n",
    "axes[0].bar(neigh_counts.index, neigh_counts.values, color='steelblue')\n",
    "axes[0].set_title('Listings by Neighbourhood Group')\n",
    "axes[0].set_xlabel('Neighbourhood Group')\n",
    "axes[0].set_ylabel('Count')\n",
    "axes[0].tick_params(axis='x', rotation=20)\n",
    "\n",
    "# Median price by neighbourhood group\n",
    "median_price = df.groupby('neighbourhood_group')['price'].median().sort_values(ascending=False)\n",
    "axes[1].bar(median_price.index, median_price.values, color='darkorange')\n",
    "axes[1].set_title('Median Price by Neighbourhood Group')\n",
    "axes[1].set_xlabel('Neighbourhood Group')\n",
    "axes[1].set_ylabel('Median Price (USD)')\n",
    "axes[1].tick_params(axis='x', rotation=20)\n",
    "\n",
    "plt.tight_layout()\n",
    "plt.show()"
   ]
  },
  {
   "cell_type": "markdown",
   "metadata": {},
   "source": [
    "## Step 7: Room Type Analysis"
   ]
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "metadata": {},
   "outputs": [],
   "source": [
    "fig, ax = plt.subplots(figsize=(8, 5))\n",
    "room_price = df.groupby('room_type')['price'].median().sort_values(ascending=False)\n",
    "ax.bar(room_price.index, room_price.values, color=['#2196F3', '#FF9800', '#4CAF50'])\n",
    "ax.set_title('Median Price by Room Type')\n",
    "ax.set_xlabel('Room Type')\n",
    "ax.set_ylabel('Median Price (USD)')\n",
    "plt.tight_layout()\n",
    "plt.show()\n",
    "\n",
    "print(df.groupby('room_type')['price'].describe())"
   ]
  },
  {
   "cell_type": "markdown",
   "metadata": {},
   "source": [
    "## Step 8: Geographical Distribution"
   ]
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "metadata": {},
   "outputs": [],
   "source": [
    "fig, ax = plt.subplots(figsize=(10, 8))\n",
    "scatter = ax.scatter(\n",
    "    df['longitude'], df['latitude'],\n",
    "    c=df['price'], cmap='viridis', alpha=0.3, s=5\n",
    ")\n",
    "plt.colorbar(scatter, label='Price (USD/night)')\n",
    "ax.set_title('NYC Airbnb Listings - Geographical Distribution')\n",
    "ax.set_xlabel('Longitude')\n",
    "ax.set_ylabel('Latitude')\n",
    "plt.tight_layout()\n",
    "plt.show()"
   ]
  },
  {
   "cell_type": "markdown",
   "metadata": {},
   "source": [
    "## Step 9: Verify Fixes and Finish"
   ]
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "metadata": {},
   "outputs": [],
   "source": [
    "df.info()"
   ]
  },
  {
   "cell_type": "code",
   "execution_count": null,
   "metadata": {},
   "outputs": [],
   "source": [
    "# Confirm fixes\n",
    "assert df['price'].min() >= 10, 'Price below minimum'\n",
    "assert df['price'].max() <= 350, 'Price above maximum'\n",
    "assert str(df['last_review'].dtype).startswith('datetime'), 'last_review not datetime'\n",
    "print('All checks passed!')\n",
    "\n",
    "run.finish()"
   ]
  }
 ],
